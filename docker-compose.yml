services:
  mysql:
    image: mysql:8.0
    container_name: careerbridge-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: careerbridge
      MYSQL_USER: careerbridge
      MYSQL_PASSWORD: 1234
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data: